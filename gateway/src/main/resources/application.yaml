
server:
  port: 8000
spring:
  config:
    import: "optional:consul:"
  application:
    name: gateway
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: pshankar26
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
#      configurations: health-check
    consul:
      enabled: true
      discovery:
        query-passing: true
#        health-check-interval: 1m
#        register: false
    gateway:
      routes:
        - id: multiplication
          uri: lb://multiplication/
          predicates:
            - Path=/challenges/**,/attempts,/attempts/**,/users/**
        - id: gamification
          uri: lb://gamification/
          predicates:
            - Path=/leaders
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedHeaders:
              - "*"
            allowedMethods:
              - "GET"
              - "POST"
              - "OPTIONS"
      default-filters:
        - name: Retry
          args:
            retries: 3
            methods: GET,POST

# Uncomment the configuration below if you want to enable route matching logs
logging:
  level:
    org.springframework.amqp.rabbit.connection.CachingConnectionFactory: WARN